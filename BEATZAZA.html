<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BEATZAZA.COM — exclusive beat auctions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: oklch(0.16 0.012 65);
    --bg-2: oklch(0.20 0.013 65);
    --bg-3: oklch(0.24 0.014 65);
    --line: oklch(0.30 0.012 65);
    --ink: oklch(0.96 0.012 85);
    --ink-dim: oklch(0.72 0.014 75);
    --ink-mute: oklch(0.55 0.012 70);
    --accent: oklch(0.80 0.17 65);
    --accent-ink: oklch(0.18 0.02 60);
    --danger: oklch(0.70 0.18 28);
    --ok: oklch(0.80 0.16 150);
    --hot: oklch(0.72 0.20 32);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  html { scroll-behavior: smooth; }
  body { min-height: 100vh; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .topbar { position: sticky; top: 0; z-index: 40; background: color-mix(in oklab, var(--bg) 85%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .topbar-inner { max-width: 1500px; margin: 0 auto; display: flex; align-items: center; gap: 20px; padding: 14px 28px; }
  .logo { display: flex; align-items: baseline; gap: 8px; font-weight: 700; letter-spacing: -0.02em; font-size: 20px; }
  .logo .lg-beat { color: var(--accent); }
  .logo .lg-zaza { color: var(--ink); }
  .logo .lg-tld { color: var(--ink); opacity: 0.7; font-size: 0.66em; font-weight: 600; margin-left: 1px; letter-spacing: -0.01em; }
  .logo .dot { width:10px; height:10px; border-radius:50%; background: var(--accent); display:inline-block; transform: translateY(1px); animation: livePulse 1.6s ease-in-out infinite; }
  .logo .sub { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); margin-left: 6px; }
  .tabs { display:flex; gap: 4px; margin-left: 20px; }
  .tab { font: inherit; font-size: 13px; color: var(--ink-dim); background: transparent; border: 1px solid transparent; border-radius: 999px; padding: 7px 14px; cursor: pointer; letter-spacing: -0.01em; }
  .tab:hover { color: var(--ink); }
  .tab.is-active { color: var(--ink); background: var(--bg-3); border-color: var(--line); }
  .tab.admin { color: var(--accent); }
  .spacer { flex: 1; }
  .counter { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); border: 1px solid var(--line); border-radius: 999px; padding: 6px 10px; display: inline-flex; gap: 8px; align-items: center; }
  .counter b { color: var(--ink); font-weight: 500; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); animation: livePulse 1.6s ease-in-out infinite; display: inline-block; }
  @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .btn { font: inherit; font-size: 13px; font-weight: 500; border-radius: 999px; padding: 9px 16px; cursor: pointer; border: 1px solid var(--line); background: var(--bg-2); color: var(--ink); transition: background .15s, border-color .15s, transform .05s; }
  .btn:hover { background: var(--bg-3); }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  .btn-primary:hover { background: oklch(0.84 0.17 65); }
  .btn-ghost { background: transparent; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .page { max-width: 1500px; margin: 0 auto; padding: 32px 28px 80px; }
  .layout { display: grid; grid-template-columns: 1fr 340px; gap: 28px; align-items: start; }

  .hero { padding: 14px 0 32px; border-bottom: 1px solid var(--line); margin-bottom: 28px; }
  .hero .eyebrow { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; display:flex; align-items:center; gap: 8px; }
  .hero .eyebrow .live-dot { background: var(--accent); }
  .hero h1 { font-size: clamp(42px, 5.5vw, 68px); line-height: 0.95; letter-spacing: -0.035em; margin: 0 0 18px; font-weight: 700; text-wrap: balance; max-width: 14ch; }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p { color: var(--ink-dim); font-size: 16px; max-width: 56ch; line-height: 1.55; margin: 0 0 20px; }
  .hero-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-pill { border: 1px solid var(--line); border-radius: 999px; padding: 8px 14px; display: inline-flex; gap: 10px; align-items: baseline; background: var(--bg-2); }
  .stat-pill .k { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-pill .v { font-size: 14px; font-weight: 600; color: var(--ink); }
  .stat-pill .v.accent { color: var(--accent); }

  .filter-row { display:flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .search { flex: 1; min-width: 240px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--line); border-radius: 999px; padding: 10px 16px; background: var(--bg-2); }
  .search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--ink); font: inherit; font-size: 14px; }
  .search input::placeholder { color: var(--ink-mute); }
  .chip { font-family:'JetBrains Mono', monospace; font-size: 11px; padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-2); color: var(--ink-dim); cursor: pointer; }
  .chip:hover { color: var(--ink); }
  .chip.is-active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
  .card { background: var(--bg-2); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .15s, transform .2s; animation: cardIn .3s ease both; position: relative; }
  .card:hover { border-color: color-mix(in oklab, var(--accent) 40%, var(--line)); }
  .card.is-playing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .card.is-hot { border-color: color-mix(in oklab, var(--hot) 60%, var(--line)); }
  .card.is-hot:hover { border-color: var(--hot); }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cardOut { to { opacity: 0; transform: scale(0.94) translateY(-4px); filter: blur(4px); } }
  .card.is-leaving { animation: cardOut .55s ease forwards; pointer-events: none; }

  .cover { position: relative; aspect-ratio: 1/1; background: var(--bg-3); overflow: hidden; }
  .cover .stripes { position: absolute; inset: 0; }
  .cover .label { position: absolute; left: 12px; bottom: 12px; font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--ink); background: color-mix(in oklab, var(--bg) 70%, transparent); padding: 4px 8px; border-radius: 999px; backdrop-filter: blur(6px); letter-spacing: 0.06em; text-transform: uppercase; }
  .cover .play { position: absolute; right: 14px; bottom: 14px; width: 48px; height: 48px; border-radius: 50%; background: var(--accent); color: var(--accent-ink); display:flex; align-items:center; justify-content:center; border: 0; cursor: pointer; box-shadow: 0 6px 20px -6px rgba(0,0,0,0.6); transition: transform .12s; }
  .cover .play:hover { transform: scale(1.06); }

  .status { position: absolute; top: 12px; left: 12px; font-family:'JetBrains Mono', monospace; font-size: 10px; padding: 4px 9px; border-radius: 999px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; backdrop-filter: blur(6px); }
  .status.open { background: color-mix(in oklab, var(--ink) 80%, transparent); color: var(--bg); }
  .status.live { background: var(--accent); color: var(--accent-ink); }
  .status.hot { background: var(--hot); color: #fff; animation: hotPulse 1.2s ease-in-out infinite; }
  .status.ending { background: var(--danger); color: #fff; animation: hotPulse 0.8s ease-in-out infinite; }
  @keyframes hotPulse { 0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklab, currentColor 40%, transparent); } 50% { box-shadow: 0 0 0 8px transparent; } }

  .card-body { padding: 14px 16px 16px; display:flex; flex-direction:column; gap: 10px; }
  .title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; }
  .producer { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); margin-top: 2px; }

  .auction-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 12px; border-radius: 10px; background: var(--bg); border: 1px solid var(--line); }
  .auction-row .k { font-family:'JetBrains Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--ink-mute); }
  .auction-row .v { font-family:'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; margin-top: 2px; }
  .auction-row .v.accent { color: var(--accent); }
  .auction-row .v.danger { color: var(--danger); }

  .card-actions { display:flex; gap: 8px; align-items: center; margin-top: 2px; }
  .bidstats { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); flex: 1; }
  .bidstats b { color: var(--ink); font-weight: 500; }

  .wave { height: 32px; display: flex; align-items: center; gap: 2px; }
  .wave .bar { flex: 1; background: var(--ink-mute); border-radius: 2px; opacity: 0.45; transition: opacity .2s, background .2s; }
  .wave .bar.is-played { background: var(--accent); opacity: 0.95; }
  .card.is-playing .wave .bar { background: var(--ink-mute); opacity: 0.55; animation: eq 0.8s ease-in-out infinite alternate; }
  .card.is-playing .wave .bar.is-played { background: var(--accent); opacity: 1; }
  .card.is-playing .wave .bar:nth-child(3n) { animation-delay: 0.1s; }
  .card.is-playing .wave .bar:nth-child(3n+1) { animation-delay: 0.25s; }
  @keyframes eq { to { transform: scaleY(1.4); } }

  .play-spin { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Upload mode toggle */
  .mode-tabs { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 2px; margin-bottom: 14px; }
  .mode-tabs button { font: inherit; font-size: 12px; padding: 7px 14px; border-radius: 7px; border: 0; background: transparent; color: var(--ink-dim); cursor: pointer; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; }
  .mode-tabs button.is-active { background: var(--bg-3); color: var(--ink); box-shadow: 0 1px 0 var(--line); }
  .hosting-help { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-top: 12px; font-size: 12.5px; color: var(--ink-dim); line-height: 1.55; }
  .hosting-help h5 { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; margin: 0 0 6px; font-weight: 600; }
  .hosting-help code { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--bg-3); padding: 1px 6px; border-radius: 4px; color: var(--ink); }
  .hosting-help ul { margin: 6px 0 0; padding-left: 18px; }
  .hosting-help li { margin-bottom: 3px; }
  .hosting-help b { color: var(--ink); font-weight: 500; }

  .url-status { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 9px; border-radius: 999px; margin-top: 6px; }
  .url-status.ok { background: color-mix(in oklab, var(--ok) 14%, transparent); color: var(--ok); border: 1px solid color-mix(in oklab, var(--ok) 30%, var(--line)); }
  .url-status.checking { background: var(--bg-3); color: var(--ink-dim); border: 1px solid var(--line); }
  .url-status.err { background: color-mix(in oklab, var(--danger) 12%, transparent); color: var(--danger); border: 1px solid color-mix(in oklab, var(--danger) 30%, var(--line)); }
  .url-status .ud { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .url-status.checking .ud { animation: livePulse 1.2s ease-in-out infinite; }

  /* Delivery / presigned URL block in winner email */
  .presigned { background: #1a1815; color: #fafaf7; border-radius: 10px; padding: 12px 14px; margin: 10px 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.5; word-break: break-all; border: 1px solid #2a2520; }
  .presigned .h { color: oklch(0.72 0.18 65); text-transform: uppercase; letter-spacing: 0.08em; font-size: 9.5px; margin-bottom: 6px; display:flex; gap: 8px; align-items: center; }
  .presigned .h .ud { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .presigned .u { color: #fafaf7; opacity: 0.9; }
  .presigned .u .qm { color: oklch(0.72 0.14 80); }

  .leaderboard { position: sticky; top: 86px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 18px; padding: 18px 18px 10px; max-height: calc(100vh - 120px); overflow-y: auto; }
  .lb-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .lb-head h3 { margin: 0; font-size: 14px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
  .lb-head .hint { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); }
  .lb-item { display: grid; grid-template-columns: 26px 40px 1fr auto; gap: 10px; align-items: center; padding: 10px 4px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .15s; }
  .lb-item:last-child { border-bottom: 0; }
  .lb-item:hover { background: color-mix(in oklab, var(--bg-3) 60%, transparent); border-radius: 8px; }
  .lb-item.is-bumped { animation: bump .8s ease; }
  @keyframes bump { 0% { background: color-mix(in oklab, var(--accent) 25%, transparent); } 100% { background: transparent; } }
  .lb-rank { font-family:'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--ink-mute); text-align: center; }
  .lb-item:nth-child(2) .lb-rank { color: var(--accent); }
  .lb-cover { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; background: var(--bg-3); position: relative; }
  .lb-info { min-width: 0; }
  .lb-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lb-sub { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
  .lb-sub .flame { color: var(--hot); }
  .lb-bid { text-align: right; }
  .lb-bid .amt { font-family:'JetBrains Mono', monospace; font-weight: 600; font-size: 13px; color: var(--accent); }
  .lb-bid .t { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); margin-top: 2px; }
  .lb-bid .t.urgent { color: var(--danger); }
  .lb-empty { text-align: center; padding: 24px 10px; color: var(--ink-mute); font-size: 12px; }
  .lb-activity { margin-top: 10px; padding-top: 12px; border-top: 1px solid var(--line); }
  .lb-activity h4 { font-family:'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--ink-mute); margin: 0 0 10px; text-transform: uppercase; }
  .activity-item { font-size: 12px; color: var(--ink-dim); margin-bottom: 6px; display: flex; gap: 8px; align-items: flex-start; animation: activityIn .3s ease; }
  @keyframes activityIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .activity-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-top: 7px; flex-shrink: 0; }
  .activity-item b { color: var(--ink); font-weight: 500; }

  .empty { border: 1px dashed var(--line); border-radius: 18px; padding: 60px 20px; text-align:center; color: var(--ink-dim); }
  .empty h3 { color: var(--ink); font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  .empty p { margin: 0; font-size: 14px; }

  .panel { max-width: 760px; margin: 0 auto; background: var(--bg-2); border: 1px solid var(--line); border-radius: 20px; padding: 28px 32px; }
  .panel h2 { margin: 0 0 6px; font-size: 28px; letter-spacing: -0.02em; }
  .panel .lead { color: var(--ink-dim); margin: 0 0 24px; font-size: 14px; }
  .admin-banner { display: inline-flex; align-items: center; gap: 8px; font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); background: color-mix(in oklab, var(--accent) 12%, transparent); border: 1px solid color-mix(in oklab, var(--accent) 40%, var(--line)); padding: 5px 10px; border-radius: 999px; margin-bottom: 16px; letter-spacing: 0.08em; text-transform: uppercase; }
  .field { margin-bottom: 16px; display:flex; flex-direction: column; gap: 6px; }
  .field label { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; }
  .field input, .field select, .field textarea { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 11px 14px; color: var(--ink); font: inherit; font-size: 14px; outline: none; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .row2 { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .drop { border: 1.5px dashed var(--line); border-radius: 14px; padding: 24px; text-align:center; cursor: pointer; transition: border-color .15s, background .15s; }
  .drop:hover, .drop.is-over { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 6%, transparent); }
  .drop input { display:none; }
  .drop .big { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
  .drop .small { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); margin-top: 6px; }
  .drop.has-file { border-style: solid; text-align: left; }
  .drop .filename { color: var(--accent); font-family:'JetBrains Mono', monospace; font-size: 12px; }
  .actions { display:flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  .backdrop { position: fixed; inset: 0; background: color-mix(in oklab, var(--bg) 70%, black 30%); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn .2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: var(--bg-2); border: 1px solid var(--line); border-radius: 20px; width: 100%; max-width: 560px; padding: 28px 28px 24px; animation: modalIn .25s cubic-bezier(0.2, 0.9, 0.3, 1.2); max-height: 90vh; overflow-y: auto; }
  @keyframes modalIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: none; } }
  .modal h3 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.02em; }
  .modal .lead { color: var(--ink-dim); font-size: 13px; margin: 0 0 20px; }
  .line-item { display: flex; gap: 14px; align-items: center; padding: 12px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 18px; background: var(--bg); }
  .line-item .mini-cover { width: 54px; height: 54px; border-radius: 8px; overflow: hidden; background: var(--bg-3); position: relative; flex-shrink: 0; }
  .line-item .t { font-weight: 600; letter-spacing: -0.01em; }
  .line-item .s { font-family:'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
  .line-item .amt { margin-left: auto; text-align: right; }
  .line-item .amt .big { font-family:'JetBrains Mono', monospace; font-weight: 600; font-size: 18px; color: var(--accent); }
  .line-item .amt .sml { font-family:'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-mute); }

  .timer-block { display: flex; align-items: center; gap: 14px; padding: 14px; border-radius: 12px; background: var(--bg); border: 1px solid var(--line); margin-bottom: 18px; }
  .timer-block .tnum { font-family:'JetBrains Mono', monospace; font-size: 28px; font-weight: 600; letter-spacing: -0.01em; color: var(--accent); }
  .timer-block.urgent .tnum { color: var(--danger); }
  .timer-block .tlabel { font-family:'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute); }

  .bid-quick { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .bid-quick button { flex: 1; min-width: 80px; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; color: var(--ink); padding: 10px; cursor: pointer; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; transition: border-color .15s, background .15s; }
  .bid-quick button:hover { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 8%, var(--bg)); }
  .bid-quick button.is-active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  .bid-history { max-height: 140px; overflow-y: auto; border: 1px solid var(--line); border-radius: 10px; background: var(--bg); }
  .bid-history-row { display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center; padding: 8px 14px; border-bottom: 1px solid var(--line); font-size: 12px; }
  .bid-history-row:last-child { border-bottom: 0; }
  .bid-history-row.is-top { background: color-mix(in oklab, var(--accent) 10%, transparent); }
  .bid-history-row .bidder { font-family: 'JetBrains Mono', monospace; color: var(--ink-dim); }

function setNested(obj, path, value) {
  const parts = path.split('.');
  const next = { ...obj };
  let cur = next;
  for (let i = 0; i < parts.length - 1; i++) {
    cur[parts[i]] = { ...cur[parts[i]] };
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
  return next;
}

function mergeSettings(saved) {
  // shallow-merge each section to keep new defaults available without losing user values
  const out = { ...DEFAULT_SETTINGS };
  if (!saved) return out;
  for (const k of Object.keys(DEFAULT_SETTINGS)) {
    out[k] = { ...DEFAULT_SETTINGS[k], ...(saved[k] || {}) };
  }
  return out;
}

// Build a Google Drive direct-download URL for a given file ID (or pass-through full URL).
// In production this is a Drive-shared file URL granted to the winner's account on auction close,
// and revoked after the 7-day window expires.
function makePresignedUrl(key, deliveryId, soldAt) {
  // If full Drive URL already, return as-is
  if (/^https?:\/\/.+drive\.google\.com/.test(key)) return key;
  // If full URL of any kind, pass through
  if (/^https?:\/\//.test(key)) return key;
  // Otherwise treat as a Drive file ID and build the direct-download URL
  return `https://drive.google.com/uc?export=download&id=${key}`;
}

const Waveform = ({ seed, progress = 0 }) => {
  const bars = useMemo(() => { const h = hash(seed); return Array.from({length:32}).map((_,i) => { const v = Math.sin((h + i*13)*0.013)*0.5 + 0.5; return 0.2 + v*0.8; }); }, [seed]);
  return <div className="wave" aria-hidden="true">{bars.map((b,i) => {
    const isPlayed = (i / bars.length) <= progress;
    return <div key={i} className={`bar ${isPlayed ? 'is-played' : ''}`} style={{ height: `${b*28+4}px` }} />;
  })}</div>;
};

// Re-anchor stale endsAt values when persisted state is loaded after a long pause.
// Without this, an old live auction immediately closes on revisit and dumps the
// entire catalog into "sold" — which is the loading bug.
function rehydrate(beats) {
  const nowT = Date.now();
  return beats.map(b => {
    if (b.status !== 'live' || !b.endsAt || b.bids.length === 0) return b;
    // If endsAt is more than 6 hours stale, treat as a fresh restart of that auction.
    if (b.endsAt < nowT - 6 * 60 * 60 * 1000) {
      return { ...b, endsAt: nowT + AUCTION_MS };
    }
    return b;
  });
}

function auctionStatus(beat) {
  if (beat.bids.length === 0) return { key: 'open', label: 'Open · starts on 1st bid', timeLeftMs: null, urgent: false };
  const timeLeftMs = Math.max(0, (beat.endsAt || 0) - Date.now());
  if (timeLeftMs <= 0) return { key: 'ending', label: 'Ending…', timeLeftMs: 0, urgent: true };
  if (timeLeftMs < 5 * 60 * 1000) return { key: 'ending', label: 'Ending soon', timeLeftMs, urgent: true };
  if (beat.bids.length >= 4) return { key: 'hot', label: 'HOT', timeLeftMs, urgent: false };
  return { key: 'live', label: 'Live', timeLeftMs, urgent: false };
}

    setMe({ handle: handleClean, email });
    applyBid(beat.id, amount, handleClean);
    pushActivity({ type: 'bid', title: beat.title, bidder: handleClean, amount, self: true });
    toast(`You're the top bid on "${beat.title}" at ${fmt$(amount)}`);
  };

  return (<>
    <audio ref={audioRef} preload="none" />
    <TopBar tab={tab} setTab={setTab} liveCount={liveCount} activeBidCount={activeBidCount} />
    <div className="page">
      {tab === 'market' && (
        <div className="layout">
          <main>
            <Hero liveCount={liveCount} activeBidCount={activeBidCount} soldCount={sold.length} />
            <FilterRow query={query} setQuery={setQuery} genreFilter={genreFilter} setGenreFilter={setGenreFilter} />
            {visibleBeats.length === 0 ? (
              <div className="empty"><h3>No open auctions</h3><p>Check back soon — new drops come fast.</p></div>
            ) : (
              <div className="grid">
                {visibleBeats.map(beat => (
                  <BeatCard key={beat.id} beat={beat} me={me}
                    isPlaying={playingId === beat.id}
                    audioState={playingId === beat.id ? audioState : 'idle'}
                    audioProgress={playingId === beat.id ? audioProgress : 0}
                    isLeaving={leavingId === beat.id}
                    onTogglePlay={() => setPlayingId(p => p === beat.id ? null : beat.id)}
                    onBid={() => setBidBeat(beat)} />
                ))}
              </div>
            )}
          </main>
          <aside>
            <Leaderboard items={leaderboard} bumpedId={bumpedId} activity={activity} me={me} onPick={(b) => setBidBeat(b)} />
          </aside>
        </div>
      )}
      {tab === 'studio' && <StudioView beats={beats} sold={sold} totalRevenue={totalRevenue} me={me} onUpload={() => setTab('upload')} onSettings={() => setTab('settings')} onUpdateSale={(id, updater) => setSold(s => s.map(x => x.id === id ? updater(x) : x))} />}
      {tab === 'upload' && <UploadPanel onSubmit={handleAddBeat} onCancel={() => setTab('studio')} settings={settings} />}
      {tab === 'settings' && <SettingsView settings={settings} onUpdate={(path, value) => setSettings(s => setNested(s, path, value))} />}
    </div>
    {bidBeat && (() => {
      const fresh = beats.find(b => b.id === bidBeat.id) || bidBeat;
      return <BidModal beat={fresh} me={me} onClose={() => setBidBeat(null)}
        onSubmit={(amount, handle, email) => handlePlaceBid({ beat: fresh, amount, handle, email })} />;
    })()}
    {wonSummary && <WonModal record={wonSummary} onClose={() => setWonSummary(null)} />}
    {policyOpen && <PolicyModal kind={policyOpen} onSwitch={setPolicyOpen} onClose={() => setPolicyOpen(null)} settings={settings} />}
    <Footer onOpen={setPolicyOpen} settings={settings} />
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.kind==='hot' ? 'hot':''}`}><span className="tdot" /> {t.msg}</div>)}
    </div>
  </>);
}

function BeatCard({ beat, me, isPlaying, audioState, audioProgress, isLeaving, onTogglePlay, onBid }) {

  const isHot = s.key === 'hot' || s.key === 'ending';
  const iAmTop = me.handle && beat.topBidder === me.handle;
  const isLoading = isPlaying && audioState === 'loading';
  const isError = isPlaying && audioState === 'error';
  return (
    <div className={`card ${isPlaying?'is-playing':''} ${isLeaving?'is-leaving':''} ${isHot?'is-hot':''}`}>
      <div className="cover">
        <CoverArt seed={beat.id + beat.title} label={beat.genre} />
        <span className={`status ${s.key}`}>{s.label}</span>
        <span className="label">{beat.duration}</span>
        <button className="play" onClick={onTogglePlay} aria-label={isPlaying?'Pause':'Play'} title={isError ? 'Stream error — click to retry' : (isPlaying ? 'Pause' : 'Play preview')}>
          {isLoading ? <svg className="play-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.55"/></svg>
            : isError ? <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 1 21h22L12 2zm0 6 7 12H5l7-12zm-1 4v4h2v-4h-2zm0 5v2h2v-2h-2z"/></svg>
            : isPlaying ? <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
            : <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>}

      </div>
      <div className="card-body">
        <div>
          <div className="title">{beat.title}</div>
          <div className="producer">{beat.bpm} BPM · {beat.key} · {beat.genre}</div>
        </div>
        <Waveform seed={beat.id} progress={isPlaying ? audioProgress : 0} />
        <div className="auction-row">
          <div><div className="k">Current bid</div><div className="v accent">{fmt$(beat.currentBid)}</div></div>
          <div><div className="k">{beat.bids.length===0 ? 'Auction clock' : 'Time left'}</div><div className={`v ${s.urgent?'danger':''}`}>{beat.bids.length===0 ? '30:00' : fmtTime(s.timeLeftMs)}</div></div>

  );

function BidModal({ beat, me, onClose, onSubmit }) {
  const s = auctionStatus(beat);
  const minBid = beat.bids.length===0 ? beat.startingBid : beat.currentBid + MIN_INCREMENT;
  const quickOptions = [minBid, minBid+10, minBid+25, minBid+50];
  const [amount, setAmount] = useState(minBid);
  const [handle, setHandle] = useState(me.handle || '');
  const [email, setEmail] = useState(me.email || '');
  useEffect(() => { setAmount(a => Math.max(Number(a)||0, minBid)); }, [minBid]);
  const validEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const validHandle = handle.trim().length >= 2;
  const validAmount = Number(amount) >= minBid;
  const canSubmit = validEmail && validHandle && validAmount;
  const submit = () => { if (!canSubmit) return; onSubmit(Number(amount), handle.trim(), email.trim()); onClose(); };
  const timeLeft = beat.endsAt ? Math.max(0, beat.endsAt - Date.now()) : AUCTION_MS;
  const iAmTop = me.handle && beat.topBidder === me.handle;
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h3>Place a bid</h3>
        <p className="lead">{beat.bids.length===0
          ? 'Your bid will start the 30-minute auction clock. If anyone bids in the last 2 minutes, the timer extends by 2.'
          : 'Highest bid at zero wins. Timer extends by 2 minutes if a bid lands in the final 2.'}</p>
        <div className="line-item">
          <div className="mini-cover"><CoverArt seed={beat.id + beat.title} /></div>
          <div><div className="t">{beat.title}</div><div className="s">{beat.bpm} BPM · {beat.key} · {beat.genre}</div></div>
          <div className="amt"><div className="big">{fmt$(beat.currentBid)}</div><div className="sml">{beat.bids.length} bids</div></div>
        </div>
        <div className={`timer-block ${s.urgent?'urgent':''}`}>
          <div>
            <div className="tlabel">{beat.bids.length===0 ? 'Clock starts on your bid' : 'Time remaining'}</div>
            <div className="tnum">{beat.bids.length===0 ? '30:00' : fmtTime(timeLeft)}</div>
          </div>
          <div style={{flex:1}} />
          {iAmTop && <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--accent)', textTransform:'uppercase', letterSpacing:'0.08em'}}>You're top<br/>bidder</div>}
        </div>
        <div className="field"><label>Your bid · min {fmt$(minBid)}</label>
          <input type="number" min={minBid} step={MIN_INCREMENT} value={amount} onChange={e => setAmount(e.target.value)} /></div>
        <div className="bid-quick">
          {quickOptions.map(q => <button key={q} className={Number(amount)===q?'is-active':''} onClick={() => setAmount(q)}>{fmt$(q)}</button>)}
        </div>
        <div className="row2">
          <div className="field"><label>Your handle</label><input type="text" value={handle} placeholder="@yourname" onChange={e => setHandle(e.target.value)} /></div>
          <div className="field"><label>Email (for delivery if you win)</label><input type="email" value={email} placeholder="you@example.com" onChange={e => setEmail(e.target.value)} /></div>
        </div>
        {beat.bids.length>0 && (
          <div style={{marginBottom:8}}>
            <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:6}}>Bid history</div>
            <div className="bid-history">
              {[...beat.bids].reverse().map((bid,i) => (
                <div key={bid.id} className={`bid-history-row ${i===0?'is-top':''}`}>
                  <span className="bidder">{bid.bidder}{bid.bidder===me.handle?' · you':''}</span>
                  <span className="amt">{fmt$(bid.amount)}</span>
                  <span className="time">{new Date(bid.at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div className="house-rules">
          <div className="hr-h">If you win, here's the deal</div>
          <ul>
            <li><b>It's yours, 100%.</b> Full ownership of the beat — no leasing, no royalties to me, do whatever you want with it (Spotify, Apple, YouTube, sync, sample, sell merch with it).</li>
            <li><b>Credit me everywhere.</b> Just one line: <span className="cred">"Produced by OBV"</span> in the song title, description, and credits — on every platform, every release. That's it.</li>
            <li><b>7 days to download.</b> Your private link is live for a week after the auction closes. After that the file is permanently deleted from our servers — back it up somewhere safe.</li>
            <li><b>No-credit = breach.</b> Failing to credit "Produced by OBV" is a breach of contract and the license can be revoked. Don't skip it.</li>
          </ul>
        </div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={!canSubmit} onClick={submit}>Bid {fmt$(amount)} →</button>
        </div>
      </div>
    </div>
  );
}

        )}
      {fresh && (() => {
        const chain = fresh.cascadeChain || [];
        const idx = fresh.currentClaimantIndex ?? 0;
        const claimant = chain[idx];
        const paidEntry = chain.find(c => c.attempt === 'paid');
        const actualPrice = paidEntry ? paidEntry.bid : (claimant ? claimant.bid : fresh.price);
        const showDeliverables = fresh.paymentStatus === 'paid';

        const markUnpaid = () => {
          onUpdateSale(fresh.id, r => {
            const nextChain = r.cascadeChain.map((c, i) => i === idx ? { ...c, attempt: 'unpaid', at: Date.now() } : c);
            const nextIdx = idx + 1;
            if (nextIdx < nextChain.length) {
              nextChain[nextIdx] = { ...nextChain[nextIdx], attempt: 'pending', at: Date.now() };
              return { ...r, cascadeChain: nextChain, currentClaimantIndex: nextIdx, paymentStatus: 'pending' };
            }
            return { ...r, cascadeChain: nextChain, paymentStatus: 'all_failed' };
          });
        };
        const markPaid = () => {
          onUpdateSale(fresh.id, r => {
            const nextChain = r.cascadeChain.map((c, i) => i === idx ? { ...c, attempt: 'paid', at: Date.now() } : c);
            return { ...r, cascadeChain: nextChain, paymentStatus: 'paid' };
          });
        };

        return (
          <div className="backdrop" onClick={() => setSelected(null)}>
            <div className="modal" onClick={e => e.stopPropagation()}>
              <h3>Sale · {fresh.title}</h3>
              <p className="lead">Public price: <b style={{color:'var(--ink)'}}>{fmt$(fresh.price)}</b> · Closed {shortDate(fresh.soldAt)}</p>

              {/* CASCADE CHAIN — admin only */}
              <div className="cascade">
                <div className="cascade-head">
                  <div>
                    <div className="cascade-title">Payment cascade <span className="admin-only">internal · never shown to bidders</span></div>
                    <div className="cascade-sub">If the current claimant doesn't pay within the window, the next bidder is offered the beat at <b>their original bid</b>. Bidders are not told this.</div>
                  </div>
                  <div className={`paystatus paystatus-${fresh.paymentStatus}`}>
                    {fresh.paymentStatus === 'paid' && `PAID · ${fmt$(actualPrice)}`}
                    {fresh.paymentStatus === 'pending' && `PENDING · ${fmt$(actualPrice)}`}
                    {fresh.paymentStatus === 'all_failed' && 'ALL FAILED'}
                  </div>
                </div>
                {chain.length === 0 ? (
                  <div className="cascade-empty">No bid history.</div>
                ) : (
                  <div className="cascade-list">
                    {chain.map((c, i) => (
                      <div key={c.handle} className={`cascade-row ${i === idx && fresh.paymentStatus !== 'all_failed' ? 'is-current' : ''} ${c.attempt}`}>
                        <span className="cr-pos">#{i + 1}</span>
                        <span className="cr-handle">{c.handle}{c.handle === me?.handle ? ' · you' : ''}</span>
                        <span className="cr-amt">{fmt$(c.bid)}</span>
                        <span className={`cr-status ${c.attempt}`}>
                          {c.attempt === 'paid' && '✓ paid'}
                          {c.attempt === 'pending' && '◴ pending'}
                          {c.attempt === 'unpaid' && '✗ no-pay'}
                          {c.attempt === 'queued' && 'queued'}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
                {fresh.paymentStatus === 'pending' && claimant && (
                  <div className="cascade-actions">
                    <button className="btn" onClick={markUnpaid}>Mark "didn't pay" → cascade</button>
                    <button className="btn btn-primary" onClick={markPaid}>Mark "paid" {fmt$(actualPrice)}</button>
                  </div>
                )}
                {fresh.paymentStatus === 'all_failed' && (
                  <div className="cascade-actions" style={{justifyContent:'flex-start'}}>
                    <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'var(--danger)'}}>No one in the chain paid. Beat is unsold — manually re-list from Studio.</span>
                  </div>
                )}
              </div>

              {/* Public-facing email preview — only shown after payment */}
              {showDeliverables ? (
                <div className="email-card">
                  <div className="email-head"><span>from: deliveries@beatzaza.com · to: {paidEntry.email}</span><span className="pill">DELIVERED</span></div>
                  <div className="email-body">
                    <div className="brand"><span className="d" /> BEATZAZA.COM</div>
                    <h4>{fresh.title} is yours. Let's go.</h4>
                    <p>Massive — you just won the one-of-one auction for <b>{fresh.title}</b> at <b>{fmt$(paidEntry.bid)}</b>. The beat is officially yours, 100%, no strings on the music itself.</p>
                    <DownloadStack record={{ ...fresh, buyerEmail: paidEntry.email, price: paidEntry.bid }} />
                    <div className="house-rules">
                      <div className="hr-h">Quick house rules</div>
                      <ul>
                        <li><b>You own it 100%.</b> Full ownership — release anywhere, sync, sample, no royalties back to me.</li>
                        <li><b>Credit OBV everywhere.</b> One line: <span className="cred">"Produced by OBV"</span> in title, description, and credits on every release.</li>
                        <li><b>7-day download window.</b> Files are wiped from the server after <b>{expiryLabel(fresh.soldAt)}</b> — back yours up.</li>
                        <li><b>No credit = breach.</b> Skipping the credit voids the license.</li>
                      </ul>
                    </div>
                    <div className="fine">Delivery ID: {fresh.deliveryId}<br/>License: Exclusive · BPM {fresh.bpm} · {fresh.keySig} · {fresh.genre}<br/>Storage: Google Drive · shared with winner only.<br/>Links presigned · expire {expiryLabel(fresh.soldAt)} (7 days after sale).</div>
                  </div>
                </div>
              ) : (
                <div className="invoice-card">
                  <div className="invoice-head"><span>Plisio crypto invoice · to: {claimant?.email}</span><span className="pill pending">AWAITING PAYMENT</span></div>
                  <div className="invoice-body">
                    <div className="invoice-amt"><span className="k">Invoice amount</span><span className="v">{fmt$(actualPrice)}</span></div>
                    <p style={{fontSize:13, color:'var(--ink-dim)', margin:'8px 0 0'}}>The winner pays via Plisio in BTC / ETH / USDT / etc. Deliverables unlock automatically once Plisio confirms the on-chain payment.</p>
                  </div>
                </div>
              )}

              <div className="actions"><button className="btn btn-primary" onClick={() => setSelected(null)}>Close</button></div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function UploadPanel({ onSubmit, onCancel }) {
  const [mode, setMode] = useState('url'); // 'url' (recommended) | 'file'
  const [title, setTitle] = useState('');
  const [starting, setStarting] = useState(99);
  const [bpm, setBpm] = useState(100);
  const [keySig, setKeySig] = useState('C min');
  const [genre, setGenre] = useState('Afrobeats');
  const [duration, setDuration] = useState('2:48');
  const [file, setFile] = useState(null);
  const [previewUrl, setPreviewUrl] = useState('');
  const [masterUrl, setMasterUrl] = useState('');
  const [stemsUrl, setStemsUrl] = useState('');
  const [licenseUrl, setLicenseUrl] = useState('');
  const [urlStatus, setUrlStatus] = useState('idle'); // 'idle'|'checking'|'ok'|'err'
  const [urlInfo, setUrlInfo] = useState('');
  const [over, setOver] = useState(false);
  const [uploading, setUploading] = useState(0);
  const inputRef = useRef(null);

  // Validate a URL by loading it as audio in the background (no full download).
  useEffect(() => {
    if (mode !== 'url' || !previewUrl.trim()) { setUrlStatus('idle'); setUrlInfo(''); return; }
    if (!/^https:\/\/.+\.(mp3|wav|m4a|aac|ogg|aiff)(\?|$)/i.test(previewUrl.trim())) {
      setUrlStatus('err'); setUrlInfo('Must be https:// and end in .mp3 / .wav / .m4a / .aac / .ogg'); return;
    }
    setUrlStatus('checking'); setUrlInfo('Probing stream…');
    const a = new Audio(); a.preload = 'metadata';
    let done = false;
    const onMeta = () => {
      if (done) return; done = true;
      const secs = Math.round(a.duration || 0);
      if (secs > 0) { const m = Math.floor(secs/60); const s = secs%60; setDuration(`${m}:${String(s).padStart(2,'0')}`); }
      setUrlStatus('ok'); setUrlInfo(`Stream OK · ${secs}s · range-request supported`);
    };
    const onErr = () => { if (done) return; done = true; setUrlStatus('err'); setUrlInfo('Stream failed — check CORS + Content-Type'); };
    a.addEventListener('loadedmetadata', onMeta); a.addEventListener('error', onErr);
    a.src = previewUrl.trim();
    const t = setTimeout(() => { if (!done) { done = true; setUrlStatus('err'); setUrlInfo('Timed out — host may block hotlinking'); } }, 8000);
    return () => { clearTimeout(t); a.removeEventListener('loadedmetadata', onMeta); a.removeEventListener('error', onErr); a.src = ''; };
  }, [previewUrl, mode]);

  const canSubmit = title && starting > 0 && (mode==='url' ? (urlStatus==='ok') : !!file);

  const handleFile = (f) => {
    if (!f) return;
    setFile(f);
    if (f.type.startsWith('audio/')) {
      const url = URL.createObjectURL(f); const a = new Audio(); a.src = url;
      a.addEventListener('loadedmetadata', () => {
        const secs = Math.round(a.duration || 0);
        if (secs > 0) { const m = Math.floor(secs/60); const s = secs%60; setDuration(`${m}:${String(s).padStart(2,'0')}`); }
      });
    }
  };
  const onDrop = (e) => { e.preventDefault(); setOver(false); const f = e.dataTransfer.files?.[0]; if (f) handleFile(f); };
  const submit = () => {
    if (!canSubmit || uploading > 0) return;
    setUploading(1); let p = 0;
    const finalUrl = mode === 'url' ? previewUrl.trim() : (file ? URL.createObjectURL(file) : '');
    const tick = () => {
      p += mode === 'url' ? 25 + Math.random()*15 : 8 + Math.random()*14;
      if (p >= 100) {
        setUploading(100);
        setTimeout(() => {
          onSubmit({
            title: title.toUpperCase(), startingBid: Number(starting), bpm: Number(bpm),
            key: keySig, genre, duration,
            filename: file?.name || (previewUrl.split('/').pop() || 'beat.mp3'),
            previewUrl: finalUrl,
            masterUrl: masterUrl.trim() || null,
            stemsUrl:  stemsUrl.trim() || null,
            licenseUrl:licenseUrl.trim() || null,
            hosting: mode === 'url' ? 'drive' : 'local',
          });
          setUploading(0);
        }, 400);
      } else { setUploading(p); setTimeout(tick, mode==='url' ? 80 : 120); }
    };
    tick();
  };

  return (
    <div className="panel">
      <div className="admin-banner"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',display:'inline-block'}} /> Admin · only you can list beats</div>
      <h2>List a new beat for auction</h2>
      <p className="lead">It goes live immediately. The 30-minute countdown starts the moment someone places the first bid.</p>

      <div className="field"><label>Audio source</label>
        <div className="mode-tabs" role="tablist">
          <button className={mode==='url'?'is-active':''} onClick={() => setMode('url')}>External URL · recommended</button>
          <button className={mode==='file'?'is-active':''} onClick={() => setMode('file')}>Upload file</button>
        </div>

        {mode === 'url' ? (
          <>
            <input type="url" value={previewUrl} onChange={e => setPreviewUrl(e.target.value)}
              placeholder="https://drive.google.com/uc?export=download&id=PREVIEW_FILE_ID"
              style={{background:'var(--bg)', border:'1px solid var(--line)', borderRadius:10, padding:'11px 14px', color:'var(--ink)', font:'inherit', fontSize:14, outline:'none', width:'100%'}} />
            {urlStatus !== 'idle' && (
              <span className={`url-status ${urlStatus}`}><span className="ud" /> {urlInfo}</span>
            )}
            <div className="hosting-help">
              <h5>How to host your MP3s on Google Drive</h5>
              <p style={{margin:0}}>Upload your watermarked preview MP3 to a Drive folder, share it as <b>"Anyone with the link · Viewer"</b>, then paste the direct-download URL here.</p>
              <ul>
                <li>Drive share URL looks like <code>https://drive.google.com/file/d/<b>FILE_ID</b>/view</code></li>
                <li>Convert it to a direct download: <code>https://drive.google.com/uc?export=download&amp;id=<b>FILE_ID</b></code></li>
                <li>Or paste the share URL — we'll auto-convert it on save.</li>
              </ul>
              <p style={{margin:'8px 0 0'}}><b>Heads up:</b> Drive isn't built for hot streaming. Files over ~25 MB or any file that gets popular can trigger Drive's anti-abuse quota and lock for 24h. Acceptable for low-volume launches; budget to migrate later.</p>
            </div>
          </>
        ) : (
          <div className={`drop ${over?'is-over':''} ${file?'has-file':''}`}
            onClick={() => inputRef.current?.click()}
            onDragOver={e => { e.preventDefault(); setOver(true); }}
            onDragLeave={() => setOver(false)} onDrop={onDrop}>
            <input ref={inputRef} type="file" accept="audio/*" onChange={e => handleFile(e.target.files?.[0])} />
            {!file ? <><div className="big">Drop .wav / .mp3 / .aiff here</div><div className="small">or click to browse · max 50 MB</div></>
              : <><div className="big">File attached</div><div className="filename">{file.name} · {(file.size/(1024*1024)).toFixed(2)} MB</div></>}
          </div>
        )}
      </div>

      <div className="field"><label>Title</label><input type="text" value={title} onChange={e => setTitle(e.target.value.toUpperCase())} placeholder="LAGOS RAIN" /></div>
      <div className="row3">
        <div className="field"><label>Starting bid (USD)</label><input type="number" min="1" step="1" value={starting} onChange={e => setStarting(e.target.value)} /></div>
        <div className="field"><label>BPM</label><input type="number" min="40" max="240" value={bpm} onChange={e => setBpm(e.target.value)} /></div>
        <div className="field"><label>Key</label><select value={keySig} onChange={e => setKeySig(e.target.value)}>{KEYS.map(k => <option key={k}>{k}</option>)}</select></div>
      </div>
      <div className="row2">
        <div className="field"><label>Genre</label><select value={genre} onChange={e => setGenre(e.target.value)}>{GENRES.map(g => <option key={g}>{g}</option>)}</select></div>
        <div className="field"><label>Duration</label><input type="text" value={duration} onChange={e => setDuration(e.target.value)} placeholder="2:48" /></div>
      </div>

      <div style={{margin:'8px 0 6px', display:'flex', alignItems:'baseline', justifyContent:'space-between'}}>
        <label style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'var(--ink-mute)', textTransform:'uppercase', letterSpacing:'0.08em'}}>Winner deliverables · private bucket</label>
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--ink-mute)'}}>optional · presigned at sale</span>
      </div>
      <div className="field">
        <input type="url" value={masterUrl} onChange={e => setMasterUrl(e.target.value)}
          placeholder="https://drive.google.com/uc?export=download&id=FILE_ID"
          style={{background:'var(--bg)', border:'1px solid var(--line)', borderRadius:10, padding:'10px 14px', color:'var(--ink)', font:'inherit', fontSize:13, outline:'none'}} />
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--ink-mute)', marginTop:2}}>Master WAV (24-bit / 48 kHz)</span>
      </div>
      <div className="field">
        <input type="url" value={stemsUrl} onChange={e => setStemsUrl(e.target.value)}
          placeholder="https://drive.google.com/uc?export=download&id=FILE_ID"
          style={{background:'var(--bg)', border:'1px solid var(--line)', borderRadius:10, padding:'10px 14px', color:'var(--ink)', font:'inherit', fontSize:13, outline:'none'}} />
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--ink-mute)', marginTop:2}}>Stems ZIP (kick, snare, bass, melody, perc, 808 …)</span>
      </div>
      <div className="field">
        <input type="url" value={licenseUrl} onChange={e => setLicenseUrl(e.target.value)}
          placeholder="https://drive.google.com/uc?export=download&id=FILE_ID"
          style={{background:'var(--bg)', border:'1px solid var(--line)', borderRadius:10, padding:'10px 14px', color:'var(--ink)', font:'inherit', fontSize:13, outline:'none'}} />
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'var(--ink-mute)', marginTop:2}}>License PDF template — winner's name + delivery ID auto-filled at sale</span>
      </div>
      <div className="hosting-help" style={{marginTop:6, marginBottom:8}}>
        <h5>Recommended Drive folder layout</h5>
        <p style={{margin:0}}>Keep your deliverables in a <b>second, separate</b> Drive folder from the previews — set it to <b>Restricted</b> sharing. On auction close we share each file directly with the winner's email for 7 days, then auto-revoke.</p>
        <ul>
          <li><code>OBV Beats / Previews</code> — Anyone with the link · Viewer (the preview MP3s)</li>
          <li><code>OBV Beats / Deliverables / &lt;slug&gt;/</code> — Restricted (master.wav, stems.zip, license.pdf)</li>
        </ul>
        <p style={{margin:'8px 0 0'}}>Drive file IDs are the 33-char string in the share URL: <code>https://drive.google.com/file/d/<b>1aB2cD3...</b>/view</code>. Paste the full URL — we extract the ID.</p>
      </div>
      {uploading > 0 && (
        <div>
          <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'var(--ink-mute)', marginTop:8}}>
            {mode==='url' ? 'Registering URL · ' : 'Uploading · '}{Math.round(uploading)}%
          </div>
          <div style={{height:6, width:'100%', background:'var(--bg-3)', borderRadius:999, overflow:'hidden', marginTop:10}}>
            <div style={{width:`${uploading}%`, height:'100%', background:'var(--accent)', transition:'width .2s'}} />
          </div>
        </div>
      )}
      <div className="actions">
        <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
        <button className="btn btn-primary" disabled={!canSubmit || uploading>0} onClick={submit}>
          {uploading>0 ? (mode==='url' ? 'Registering…' : 'Uploading…') : 'Put it live →'}
        </button>
      </div>
    </div>
  );
}

function SettingsView({ settings, onUpdate }) {
  const u = (path) => (e) => onUpdate(path, e && e.target ? (e.target.type === 'checkbox' ? e.target.checked : e.target.value) : e);
  const t = (path) => (v) => onUpdate(path, v);
  const s = settings;

  const adsTxtPreview = s.ads.adsTxt || '# ads.txt is empty — paste the line your ad network gave you.';

  // Scroll-spy — highlight the TOC chip for whichever section the reader is currently on.
  // Walks sections top-down and picks the last one whose top has crossed a fixed trigger
  // line. Stable: only one section can ever be "active" regardless of viewport overlap.
  const SECTION_IDS = ['s-status','s-site','s-seo','s-auth','s-ads','s-custom','s-storage','s-auction','s-license','s-email','s-payments'];
  const [activeSection, setActiveSection] = useState('s-status');
  useEffect(() => {
    const els = SECTION_IDS.map(id => document.getElementById(id)).filter(Boolean);
    if (!els.length) return;
    let raf = 0;
    const compute = () => {
      raf = 0;
      // trigger line ≈ top of viewport + topbar(60) + toc(~58) + small gap
      const triggerY = 180;
      let current = els[0].id;
      for (const el of els) {
        const top = el.getBoundingClientRect().top;
        if (top - triggerY <= 0) current = el.id;
        else break;
      }
      setActiveSection(prev => prev === current ? prev : current);
    };
    const schedule = () => { if (!raf) raf = requestAnimationFrame(compute); };
    compute();
    window.addEventListener('scroll', schedule, { passive: true });
    window.addEventListener('resize', schedule);
    return () => {
      window.removeEventListener('scroll', schedule);
      window.removeEventListener('resize', schedule);
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);

  return (
    <div className="settings">
      <div className="head">
        <div>
          <div className="admin-banner"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--accent)',display:'inline-block'}} /> Admin · only you see this</div>
          <h2>Settings</h2>
          <p>Everything that doesn't belong inside an individual auction. Changes save automatically — no submit button.</p>
        </div>
      </div>

      <nav className="settings-toc">
        <a href="#s-status" className={activeSection==='s-status'?'is-active':''}>Status</a>
        <a href="#s-site" className={activeSection==='s-site'?'is-active':''}>Site</a>
        <a href="#s-seo" className={activeSection==='s-seo'?'is-active':''}>SEO</a>
        <a href="#s-auth" className={activeSection==='s-auth'?'is-active':''}>Auth</a>
        <a href="#s-ads" className={activeSection==='s-ads'?'is-active':''}>Ads</a>
        <a href="#s-custom" className={activeSection==='s-custom'?'is-active':''}>Custom code</a>
        <a href="#s-storage" className={activeSection==='s-storage'?'is-active':''}>Storage</a>
        <a href="#s-auction" className={activeSection==='s-auction'?'is-active':''}>Auction</a>
        <a href="#s-license" className={activeSection==='s-license'?'is-active':''}>License</a>
        <a href="#s-email" className={activeSection==='s-email'?'is-active':''}>Email</a>
        <a href="#s-payments" className={activeSection==='s-payments'?'is-active':''}>Payments</a>
      </nav>

      {/* STATUS */}
      <section className="settings-section" id="s-status">
        <h3><span className="ix">00</span>Connected services</h3>
        <p className="sect-lead">Quick glance at what's wired up. Configure each below.</p>
        <div className="conn-grid">
          <ConnDot on={!!s.storage.googleApiKey || !!s.storage.drivePublicFolderId} name="Google Drive" status={(s.storage.googleApiKey || s.storage.drivePublicFolderId) ? 'Connected' : 'Not set'} />
          <ConnDot on={!!s.payments.plisioApiKey} name="Plisio · Crypto" status={s.payments.plisioApiKey ? 'Live' : 'Not set'} />
          <ConnDot on={s.auth.googleEnabled && !!s.auth.googleClientId} name="Google Sign-In" status={s.auth.googleEnabled && s.auth.googleClientId ? 'Active' : 'Off'} />
          <ConnDot on={!!s.email.senderEmail && !!s.email.sendingDomain} name="Email · Resend" status={s.email.senderEmail ? 'Configured' : 'Not set'} />
          <ConnDot on={s.ads.adsenseEnabled && !!s.ads.adsensePublisherId} name="Google AdSense" status={s.ads.adsenseEnabled && s.ads.adsensePublisherId ? 'Active' : 'Off'} />
          <ConnDot on={!!s.seo.ga4Id} name="Google Analytics" status={s.seo.ga4Id ? 'Tracking' : 'Off'} />
        </div>
      </section>

      {/* SITE */}
      <section className="settings-section" id="s-site">
        <h3><span className="ix">01</span>Site identity</h3>
        <p className="sect-lead">The basics: name, domain, where buyers can reach you.</p>
        <div className="row2">
          <div className="field"><label>Site name</label><input type="text" value={s.site.name} onChange={u('site.name')} /></div>

          <ol style={{margin:'6px 0 0', paddingLeft:18}}>

            <li>Winner pays in their chosen coin. Plisio sends a webhook when confirmations are reached.</li>
            <li>On webhook receipt, we generate the Drive delivery links and email them out.</li>
            <li>If <code>{s.payments.paymentWindowHours}h</code> passes without payment, auction auto-cascades to runner-up.</li>
          </ol>
        </div>
      </section>

function Footer({ onOpen, settings }) {
  const year = new Date().getFullYear();
  const domain = settings?.site?.domain || 'beatzaza.com';
  const email = settings?.site?.contactEmail || 'hello@beatzaza.com';
  return (
    <footer className="site-footer">
      <div className="ft-brand">© {year} <b>BEATZAZA.COM</b> · operated by OBV</div>
      <div className="ft-links">
        <button onClick={() => onOpen('terms')}>Terms of Service</button>
        <button onClick={() => onOpen('privacy')}>Privacy Policy</button>
        <button onClick={() => onOpen('faq')}>FAQ</button>
      </div>
      <div className="ft-contact">Contact: <a href={`mailto:${email}`}>{email}</a></div>
    </footer>
  );
}

function PolicyModal({ kind, onSwitch, onClose, settings }) {
  const domain = settings?.site?.domain || 'beatzaza.com';
  const credit = settings?.license?.creditPhrase || 'Produced by OBV';
  const downloadDays = settings?.license?.downloadWindowDays || 7;
  const paymentWindow = settings?.payments?.paymentWindowHours || 24;
  return (
    <div className="backdrop" onClick={onClose}>
      <div className="policy-modal" onClick={e => e.stopPropagation()}>
        <div className="policy-tabs">
          <button className={kind==='terms'?'is-active':''} onClick={() => onSwitch('terms')}>Terms of Service</button>
          <button className={kind==='privacy'?'is-active':''} onClick={() => onSwitch('privacy')}>Privacy Policy</button>
          <button className={kind==='faq'?'is-active':''} onClick={() => onSwitch('faq')}>FAQ</button>
          <span className="pt-spacer" />
          <button className="pt-close" onClick={onClose}>× Close</button>
        </div>
        <div className="policy-body">
          {kind === 'terms' && <TermsContent domain={domain} credit={credit} downloadDays={downloadDays} paymentWindow={paymentWindow} />}
          {kind === 'privacy' && <PrivacyContent domain={domain} />}
          {kind === 'faq' && <FaqContent domain={domain} credit={credit} downloadDays={downloadDays} paymentWindow={paymentWindow} />}
        </div>
      </div>
    </div>
  );
}
